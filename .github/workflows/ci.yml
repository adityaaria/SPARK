name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Run plugin and installer tests
        run: npm test

      - name: Run shell lint test coverage
        run: bash tests/shell-lint/test-lint-shell.sh

      - name: Run enterprise hardening checks
        run: bash tests/native-installer/test-enterprise-hardening.sh

      - name: Validate package contents
        run: npm pack --dry-run
